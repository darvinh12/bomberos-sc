<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bomberos Caracas — API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css" />
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .topbar { display:flex; align-items:center; gap:1rem; background:#b71c1c; color:#fff; padding:0.75rem 1.5rem; }
    .topbar h1 { font-size: 1.1rem; margin:0; font-weight:600; }
    .topbar a { color:#fff; text-decoration:none; opacity:0.85; font-size:0.9rem; }
    .topbar a:hover { opacity:1; }
    .topbar .spacer { flex:1; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>🚒 Bomberos Caracas API</h1>
    <span class="spacer"></span>
    <a href="../index.html">← Inicio</a>
    <a href="./redoc.html">ReDoc</a>
    <a href="./openapi.json">openapi.json</a>
    <a href="https://github.com/ganesh4494/bomberos-caracas-bd" target="_blank">GitHub</a>
  </header>
  <div id="swagger"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "./openapi.json",
      dom_id: "#swagger",
      deepLinking: true,
      defaultModelsExpandDepth: 0,
      docExpansion: "list",
      filter: true,
      tryItOutEnabled: false,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: "StandaloneLayout"
    });
  </script>
</body>
</html>
