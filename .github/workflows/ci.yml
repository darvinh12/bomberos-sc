name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "sql/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "sql/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  api-test:
    name: API — Lint + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bomberos_caracas
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: apps/api
        run: ruff check src tests

      - name: Cargar esquema BD
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d bomberos_caracas -f sql/99_run_all.sql

      - name: Tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bomberos_caracas
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-only
        run: pytest -q

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Build
        working-directory: apps/web
        env:
          API_URL: http://localhost:8000
        run: npm run build

  api-docker:
    name: API — Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: bomberos-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test bootstrap import
        run: |
          docker run --rm --entrypoint python bomberos-api:ci -c "from bomberos_api.main import app; from bomberos_api.scripts.bootstrap import main; print('imports OK')"
      - name: Verify sql/ copied
        run: |
          docker run --rm --entrypoint sh bomberos-api:ci -c "ls /app/sql/01_base.sql && ls /app/sql/05_campos_custom.sql"
