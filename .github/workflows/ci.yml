name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "sql/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "sql/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  api-test:
    name: API — Lint + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bomberos_caracas
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: apps/api
        run: ruff check src tests

      - name: Cargar esquema BD
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d bomberos_caracas -f sql/99_run_all.sql

      - name: Tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bomberos_caracas
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-only
        run: pytest -q

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Build
        working-directory: apps/web
        env:
          API_URL: http://localhost:8000
        run: npm run build
