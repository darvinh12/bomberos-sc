services:
  postgres:
    image: postgres:16-alpine
    container_name: bomberos_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bomberos_caracas
      LANG: es_VE.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - bomberos_pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bomberos_caracas"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bomberos_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/bomberos_caracas
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cambiar-esto-en-produccion-debe-ser-largo-y-aleatorio}
      BOOTSTRAP_ADMIN_USER: ${BOOTSTRAP_ADMIN_USER:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@bomberos.gob.ve}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-0}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/sigp-api}
    container_name: bomberos_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: http://api:8000

  caddy:
    image: caddy:2-alpine
    container_name: bomberos_caddy
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - bomberos_caddy_data:/data

volumes:
  bomberos_pg_data:
  bomberos_caddy_data:
